name: React Doctor

on:
  pull_request:
    branches: [main]

jobs:
  react-doctor:
    name: React Doctor Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Run React Doctor
        id: scan
        working-directory: Frontend
        env:
          NO_COLOR: "1"
          FORCE_COLOR: "0"
        run: |
          OUTPUT=$(npx -y react-doctor@latest . --verbose --diff 2>&1) || true
          # Strip any remaining ANSI escape codes
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          echo "$CLEAN"
          SCORE=$(echo "$CLEAN" | grep -oP '\d+ / 100' | head -1 || echo "unknown")
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          # Extract warning count line (e.g. "67 warnings  across 32/131 files")
          WARNINGS=$(echo "$CLEAN" | grep -oP '\d+ warnings.*?files' | head -1 || echo "")
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
          # Extract warning lines (lines starting with ⚠)
          DETAILS=$(echo "$CLEAN" | grep '⚠' | sed 's/^[[:space:]]*//' || echo "")
          {
            echo "details<<REACT_DOCTOR_EOF"
            echo "$DETAILS"
            echo "REACT_DOCTOR_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          SCORE: ${{ steps.scan.outputs.score }}
          WARNINGS: ${{ steps.scan.outputs.warnings }}
          DETAILS: ${{ steps.scan.outputs.details }}
        with:
          script: |
            const score = process.env.SCORE || 'unknown';
            const warnings = process.env.WARNINGS || '';
            const details = process.env.DETAILS || '';

            const scoreNum = parseInt(score);
            const icon = scoreNum === 100 ? ':white_check_mark:' : scoreNum >= 90 ? ':large_orange_diamond:' : ':red_circle:';

            let body = '### ' + icon + ' React Doctor Report\n\n'
              + '**Score: ' + score + '**\n';

            if (warnings) {
              body += '\n' + warnings + '\n';
            }

            if (details.trim()) {
              body += '\n<details>\n<summary>Warnings</summary>\n\n'
                + '```\n' + details + '\n```\n'
                + '\n</details>\n';
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = 'React Doctor Report';
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }