services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      target: deps
    command: npm run dev
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "9999:3000"
      - "24678:24678"
